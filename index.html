<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- index.html <head> — remplacer l'@import CSS par des <link> -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
			rel="stylesheet"
		/>

		<!-- index.html -->
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

		<!-- SEO: Title optimisé (50-60 chars) -->
		<title>Auralis — AI Copilot for Data-Driven Insights | Analytics</title>

		<!-- SEO: Meta description (150-160 chars avec CTA) -->
		<meta
			name="description"
			content="Auralis transforms complex data into clear, actionable insights for modern teams. AI-powered analytics copilot. Start your free practice today."
		/>

		<!-- SEO: Canonical -->
		<link rel="canonical" href="https://auralis.app/" />

		<!-- SEO: Robots -->
		<meta name="robots" content="index, follow" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta
			property="og:title"
			content="Auralis — AI Copilot for Data-Driven Insights"
		/>
		<meta
			property="og:description"
			content="Transform complex data into clear, actionable insights for modern teams."
		/>
		<meta property="og:image" content="https://auralis.app/og-image.jpg" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url" content="https://auralis.app/" />
		<meta property="og:site_name" content="Auralis" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta
			name="twitter:title"
			content="Auralis — AI Copilot for Data-Driven Insights"
		/>
		<meta
			name="twitter:description"
			content="Transform complex data into clear, actionable insights for modern teams."
		/>
		<meta name="twitter:image" content="https://auralis.app/og-image.jpg" />

		<!-- Preconnect -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- index.html <head> — après les preconnect -->
		<link rel="preload" as="image" href="/src/assets/bg-hero.jpg" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
